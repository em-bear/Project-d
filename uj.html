<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>A4 G-code Rajzoló</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
  }

  canvas {
    border: 2px solid white;
    background: #222;
    cursor: crosshair;
  }

  button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h2>🎨 A4 Rajzoló → G-code</h2>

<canvas id="canvas" width="595" height="842"></canvas>
<br>

<button onclick="undo()">Undo</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadGcode()">Kész (letöltés)</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let lines = [];

// A4 mm
const A4_WIDTH = 210;
const A4_HEIGHT = 297;

// ===== GRID =====
function drawGrid() {
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;

  for (let x = 0; x < canvas.width; x += canvas.width / 21) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += canvas.height / 29.7) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// ===== REDRAW =====
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  for (let line of lines) {
    ctx.beginPath();
    for (let i = 0; i < line.length; i++) {
      const p = line[i];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
}

// ===== SMOOTHING =====
function smoothLine(points) {
  if (points.length < 3) return points;

  let smoothed = [];
  smoothed.push(points[0]);

  for (let i = 1; i < points.length - 1; i++) {
    let prev = points[i - 1];
    let curr = points[i];
    let next = points[i + 1];

    let x = (prev.x + curr.x + next.x) / 3;
    let y = (prev.y + curr.y + next.y) / 3;

    smoothed.push({ x, y });
  }

  smoothed.push(points[points.length - 1]);
  return smoothed;
}

// ===== DRAW EVENTS =====
canvas.addEventListener("mousedown", () => {
  drawing = true;
  lines.push([]);
});

canvas.addEventListener("mouseup", () => {
  drawing = false;

  let last = lines[lines.length - 1];
  lines[lines.length - 1] = smoothLine(last);
  redraw();
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let current = lines[lines.length - 1];
  current.push({ x, y });

  redraw();
});

// ===== UNDO =====
function undo() {
  lines.pop();
  redraw();
}

// ===== CLEAR =====
function clearCanvas() {
  lines = [];
  redraw();
}

// ===== GCODE =====
function downloadGcode() {
  let gcode = "";
  
  gcode += "G21\n"; // mm
  gcode += "G90\n"; // abs
  gcode += "G28\n"; // home

  const scaleX = A4_WIDTH / canvas.width;
  const scaleY = A4_HEIGHT / canvas.height;

  for (let line of lines) {
    if (line.length === 0) continue;

    let start = line[0];

    let x0 = (start.x * scaleX).toFixed(2);
    let y0 = (start.y * scaleY).toFixed(2);

    gcode += `G0 X${x0} Y${y0}\n`;

    gcode += "M300 S50\n"; // toll le

    for (let p of line) {
      let x = (p.x * scaleX).toFixed(2);
      let y = (p.y * scaleY).toFixed(2);

      gcode += `G1 X${x} Y${y} F3000\n`;
    }

    gcode += "M300 S30\n"; // toll fel
  }

  gcode += "G0 X0 Y0\n";

  const blob = new Blob([gcode], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rajz.gcode";
  a.click();

  URL.revokeObjectURL(url);
}

// INIT
drawGrid();
</script>

</body>
</html>
