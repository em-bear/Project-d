<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Rajzoló → G-code</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  h2 {
    margin: 10px;
  }

  canvas {
    background: white;
    touch-action: none;
    border: 2px solid #444;
  }

  button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
  }
</style>
</head>

<body>

<h2>🎨 Rajzolj → G-code</h2>

<canvas id="canvas"></canvas><br>

<button onclick="undo()">Undo</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadGcode()">Kész</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ===== A4 ARÁNY =====
const A4_RATIO = 210 / 297;
const width = 500;
const height = width / A4_RATIO;

canvas.width = width;
canvas.height = height;

// ===== ÁLLAPOT =====
let drawing = false;
let lines = [];
let currentLine = [];

// ===== RAJZ STÍLUS =====
ctx.lineWidth = 2;
ctx.lineCap = "round";
ctx.lineJoin = "round";
ctx.strokeStyle = "black";

// ===== POZÍCIÓ =====
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

// ===== RAJZ =====
function start(e) {
  drawing = true;
  currentLine = [];
  lines.push(currentLine);

  const pos = getPos(e);
  currentLine.push(pos);

  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!drawing) return;

  const pos = getPos(e);
  currentLine.push(pos);

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function end() {
  drawing = false;
}

// ===== EVENTEK (egér + touch) =====
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", end);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", end);

// ===== UNDO =====
function undo() {
  lines.pop();
  redraw();
}

// ===== CLEAR =====
function clearCanvas() {
  lines = [];
  redraw();
}

// ===== REDRAW =====
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let line of lines) {
    if (line.length < 2) continue;

    ctx.beginPath();
    ctx.moveTo(line[0].x, line[0].y);

    for (let i = 1; i < line.length; i++) {
      ctx.lineTo(line[i].x, line[i].y);
    }

    ctx.stroke();
  }
}

// ===== SIMÍTÁS =====
function smooth(points) {
  if (points.length < 3) return points;

  let result = [points[0]];

  for (let i = 1; i < points.length - 1; i++) {
    let x = (points[i-1].x + points[i].x + points[i+1].x) / 3;
    let y = (points[i-1].y + points[i].y + points[i+1].y) / 3;
    result.push({x, y});
  }

  result.push(points[points.length - 1]);
  return result;
}

// ===== GCODE =====
function downloadGcode() {
  let gcode = "G21\nG90\nG28\n";

  const scaleX = 210 / canvas.width;
  const scaleY = 297 / canvas.height;

  for (let line of lines) {
    let smoothed = smooth(line);
    if (smoothed.length < 2) continue;

    let start = smoothed[0];
    gcode += `G0 X${(start.x*scaleX).toFixed(2)} Y${(start.y*scaleY).toFixed(2)}\n`;

    gcode += "M300 S50\n";

    for (let p of smoothed) {
      gcode += `G1 X${(p.x*scaleX).toFixed(2)} Y${(p.y*scaleY).toFixed(2)} F3000\n`;
    }

    gcode += "M300 S30\n";
  }

  gcode += "G0 X0 Y0\n";

  const blob = new Blob([gcode], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rajz.gcode";
  a.click();
}
</script>

</body>
</html>
